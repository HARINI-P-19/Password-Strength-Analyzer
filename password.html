<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Strength Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"], input[type="password"] {
      flex: 1;
      padding: 10px 12px;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #999; background: #fff; }

    button {
      padding: 10px 14px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button:hover { background: #f5f5f3; }
    button:active { transform: scale(0.98); }

    .strength-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .strength-label-text { font-size: 13px; color: #888; }

    #strengthLabel {
      font-size: 13px;
      font-weight: 500;
      color: #888;
    }

    .bar-track {
      height: 6px;
      background: #eee;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    #bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.35s ease, background-color 0.35s ease;
    }

    .checks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: #555;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #ddd;
      transition: background 0.2s;
    }

    .dot.pass { background: #1D9E75; }

    #suggestions { margin-top: 0; }

    .sug-item {
      font-size: 13px;
      color: #555;
      padding: 6px 0;
      border-top: 1px solid #f0f0ee;
      line-height: 1.5;
    }

    .sug-item:first-child { border-top: none; padding-top: 0; }

    .sug-success {
      font-size: 13px;
      color: #1D9E75;
      font-weight: 500;
    }

    #genBtn {
      margin-top: 12px;
      width: 100%;
      font-size: 13px;
      color: #333;
    }

    .entropy-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      flex: 1;
      background: #f5f5f3;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .stat-lbl {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    #suggestCard { display: none; }

    .generated-pw {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      background: #f5f5f3;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      word-break: break-all;
      color: #1a1a1a;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Password Strength Analyzer</h1>
  <p class="subtitle">Evaluate your password and get actionable suggestions.</p>

  <!-- Input -->
  <div class="card">
    <p class="card-label">Enter password</p>
    <div class="input-row">
      <input type="password" id="pw" placeholder="Type your password…" oninput="analyze()" autocomplete="off" />
      <button onclick="toggleVis()" id="visBtn">Show</button>
    </div>
    <div class="entropy-row">
      <div class="stat"><div class="stat-val" id="statLen">0</div><div class="stat-lbl">Length</div></div>
      <div class="stat"><div class="stat-val" id="statEntropy">0</div><div class="stat-lbl">Entropy (bits)</div></div>
      <div class="stat"><div class="stat-val" id="statScore">0/6</div><div class="stat-lbl">Criteria met</div></div>
    </div>
  </div>

  <!-- Strength meter -->
  <div class="card">
    <div class="strength-header">
      <span class="strength-label-text">Strength</span>
      <span id="strengthLabel">—</span>
    </div>
    <div class="bar-track"><div id="bar"></div></div>
    <div class="checks-grid" id="checksGrid"></div>
  </div>

  <!-- Suggestions + generator -->
  <div class="card" id="suggestCard">
    <p class="card-label">Suggestions</p>
    <div id="suggestions"></div>
    <div id="generatedPw" class="generated-pw"></div>
    <button id="genBtn" onclick="generateAlternative()">Generate stronger alternative</button>
  </div>
</div>

<script>
  const CRITERIA = [
    { id: 'len',    label: '12+ characters',     test: p => p.length >= 12 },
    { id: 'upper',  label: 'Uppercase letter',    test: p => /[A-Z]/.test(p) },
    { id: 'lower',  label: 'Lowercase letter',    test: p => /[a-z]/.test(p) },
    { id: 'num',    label: 'Number',              test: p => /[0-9]/.test(p) },
    { id: 'sym',    label: 'Special character',   test: p => /[^A-Za-z0-9]/.test(p) },
    { id: 'nodict', label: 'Not a common word',   test: p => !COMMON.includes(p.toLowerCase()) },
  ];

  const COMMON = ['password','123456','qwerty','letmein','admin','welcome','monkey','dragon',
    'master','sunshine','iloveyou','princess','football','baseball','shadow','superman',
    'michael','charlie','donald','abc123','pass','login','root','user','guest'];

  const LEVELS = [
    { label: 'Very weak',   color: '#E24B4A', pct: 10 },
    { label: 'Weak',        color: '#EF9F27', pct: 28 },
    { label: 'Fair',        color: '#FAC775', pct: 52 },
    { label: 'Strong',      color: '#1D9E75', pct: 78 },
    { label: 'Very strong', color: '#0F6E56', pct: 100 },
  ];

  const SUGGESTIONS = {
    len:    'Make it longer — aim for at least 12 characters.',
    upper:  'Add at least one uppercase letter (A–Z).',
    lower:  'Add at least one lowercase letter (a–z).',
    num:    'Include at least one number (0–9).',
    sym:    'Use a special character: @, #, !, $, %, ^, &, *.',
    nodict: 'Avoid common words — try a passphrase or random combination.',
  };

  function calcEntropy(p) {
    let pool = 0;
    if (/[a-z]/.test(p)) pool += 26;
    if (/[A-Z]/.test(p)) pool += 26;
    if (/[0-9]/.test(p)) pool += 10;
    if (/[^A-Za-z0-9]/.test(p)) pool += 32;
    return pool > 0 ? Math.round(p.length * Math.log2(pool)) : 0;
  }

  function analyze() {
    const p = document.getElementById('pw').value;
    const grid = document.getElementById('checksGrid');
    grid.innerHTML = '';
    let score = 0;
    const failIds = [];

    CRITERIA.forEach(c => {
      const pass = p.length > 0 && c.test(p);
      if (pass) score++;
      else if (p.length > 0) failIds.push(c.id);
      const item = document.createElement('div');
      item.className = 'check-item';
      item.innerHTML = `<div class="dot ${pass ? 'pass' : ''}"></div><span>${c.label}</span>`;
      grid.appendChild(item);
    });

    // Stats
    document.getElementById('statLen').textContent = p.length;
    document.getElementById('statEntropy').textContent = calcEntropy(p);
    document.getElementById('statScore').textContent = p.length > 0 ? score + '/6' : '0/6';

    // Bar
    const bar = document.getElementById('bar');
    const lbl = document.getElementById('strengthLabel');
    if (p.length === 0) {
      bar.style.width = '0%';
      lbl.textContent = '—';
      lbl.style.color = '#888';
    } else {
      const lvlIdx = score <= 1 ? 0 : score <= 2 ? 1 : score <= 3 ? 2 : score <= 4 ? 3 : 4;
      const lvl = LEVELS[lvlIdx];
      bar.style.width = lvl.pct + '%';
      bar.style.backgroundColor = lvl.color;
      lbl.textContent = lvl.label;
      lbl.style.color = lvl.color;
    }

    // Suggestions
    const sugCard = document.getElementById('suggestCard');
    const sugEl = document.getElementById('suggestions');
    if (p.length > 0) {
      sugCard.style.display = 'block';
      if (failIds.length > 0) {
        sugEl.innerHTML = failIds.map(id =>
          `<div class="sug-item">• ${SUGGESTIONS[id]}</div>`).join('');
      } else {
        sugEl.innerHTML = '<p class="sug-success">All criteria met — excellent password!</p>';
      }
    } else {
      sugCard.style.display = 'none';
    }
  }

  function toggleVis() {
    const inp = document.getElementById('pw');
    const btn = document.getElementById('visBtn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
    else { inp.type = 'password'; btn.textContent = 'Show'; }
  }

  function generateAlternative() {
    const words = ['tiger','ocean','spark','grove','lunar','prism','swift','ember','crane','frost',
      'blaze','cliff','storm','ridge','cedar','maple','cobalt','silver','amber','jade'];
    const syms = ['!','@','#','$','%','&','*','?'];
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1);
    const pw = capitalize(pick(words)) + capitalize(pick(words)) +
               (Math.floor(Math.random() * 90) + 10) + pick(syms);
    const box = document.getElementById('generatedPw');
    box.style.display = 'block';
    box.textContent = '✓ Suggestion: ' + pw;
    document.getElementById('pw').value = pw;
    document.getElementById('pw').type = 'text';
    document.getElementById('visBtn').textContent = 'Hide';
    analyze();
  }
</script>

</body>
</html>
